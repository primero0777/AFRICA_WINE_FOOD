<!DOCTYPE html>
<html lang="fr" data-lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4D0F1C" />
  <meta name="robots" content="noindex">
  <title>Page introuvable — Africa Wine Food</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--dark);
      color: var(--cream);
    }
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      color: var(--bordeaux);
      line-height: 1;
      margin: 0;
    }
    .error-icon {
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--gold);
      margin: 0.5rem 0 1rem;
    }
    .error-desc {
      font-family: 'Raleway', sans-serif;
      font-size: 1rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--bordeaux)" stroke-width="1.5" width="64" height="64" aria-hidden="true">
      <path d="M8 2v4M16 2v4M12 2v4M5 8c0 7 3 12 7 12s7-5 7-12H5z"/>
      <path d="M9 14c1 1 2 1.5 3 1.5s2-.5 3-1.5"/>
    </svg>
  </div>
  <p class="error-code">404</p>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-desc">La page que vous recherchez a peut-être été déplacée, renommée ou n'existe pas. Laissez-nous vous guider vers les bonnes bouteilles.</p>
  <div class="error-actions">
    <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
    <a href="catalogue.html" class="btn btn-gold">Voir le catalogue</a>
  </div>
</div>
</body>
</html>
